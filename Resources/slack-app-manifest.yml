# Paste this into api.slack.com/apps → Create New App → From a manifest.
# Pick your dev workspace. Sets up scopes + redirect in one shot.
#
# Lede operates entirely on the user token (authed_user.access_token from
# OAuth v2). No bot user + no bot scopes are required.
display_information:
  name: Lede
  description: Triage Slack messages via the Lede menu-bar app.
  background_color: "#1d2533"
oauth_config:
  # Slack matches redirect_uri strictly (scheme+host+port+path), so Lede's
  # loopback server binds the fixed port 53682. Keep this URL exactly in
  # sync with redirectPort + redirectPath in Sources/Lede/SlackSource.swift.
  redirect_urls:
    - http://localhost:53682/oauth/slack
  scopes:
    user:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - search:read
      - users:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
