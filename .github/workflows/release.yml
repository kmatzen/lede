name: Release

# Cuts a notarized, EdDSA-signed Lede release whenever you push a tag like
# `v0.1.2`. Produces a Lede-X.Y.Z.dmg attached to a GitHub Release, then
# auto-publishes the update to existing installs by appending the new
# <item> to docs/appcast.xml on main (GitHub Pages serves it). Pushing the
# tag is the rollout signal — push when you're ready for users to update.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_ID                         your Apple ID email
#   APPLE_TEAM_ID                    10-char team id (developer.apple.com → Membership)
#   APPLE_APP_SPECIFIC_PASSWORD      generated at appleid.apple.com → App-Specific Passwords
#   DEVELOPER_ID_CERT_P12            base64 of your Developer ID Application .p12 export
#                                    (Keychain Access → export → choose .p12 → set a password)
#   DEVELOPER_ID_CERT_PASSWORD       password used for the .p12 export above
#   SPARKLE_PRIVATE_KEY              the EdDSA private key string (~44 chars, base64).
#                                    Find it via:
#                                       security find-generic-password -s 'https://sparkle-project.org' -w
#
# To re-sign a failed release: delete the GitHub Release + its tag, fix, retag,
# push. The workflow is idempotent.

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write       # required by softprops/action-gh-release to upload assets
      pull-requests: write  # required to open the appcast/website publish PR

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building Lede $VERSION"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID Application certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/lede-build.keychain-db"
          KEYCHAIN_PASSWORD="ci-build-$RANDOM"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
              -k "$KEYCHAIN_PATH" \
              -P "$CERT_PASSWORD" \
              -T /usr/bin/codesign \
              -T /usr/bin/security
          rm "$CERT_PATH"

          # Add to the search list and make it the default so codesign and
          # notarytool both find the cert + notary profile without flags.
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          # Allow codesign to use the private key non-interactively.
          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Sanity check: a Developer ID Application identity is now visible.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Profile lives in the (now-default) temp keychain, which the
          # Makefile's `notarytool submit --keychain-profile lede-notary`
          # invocations also resolve against.
          xcrun notarytool store-credentials lede-notary \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build, sign, notarize, and DMG
        run: make dmg VERSION="$VERSION"

      - name: EdDSA-sign DMG with Sparkle key
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          DMG=".build/apple/Products/Release/Lede-$VERSION.dmg"
          SIGN_UPDATE=".build/artifacts/sparkle/Sparkle/bin/sign_update"

          if [ ! -x "$SIGN_UPDATE" ]; then
            echo "::error::sign_update binary not found at $SIGN_UPDATE"
            exit 1
          fi

          # `-f <keyfile>` reads the base64 private key from a file. Sparkle
          # deprecated `-s <key>` (key on the argv) since recent versions
          # because process arguments are world-readable on most systems.
          KEY_FILE="$RUNNER_TEMP/sparkle.key"
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          ATTRS=$("$SIGN_UPDATE" -f "$KEY_FILE" "$DMG")
          rm -f "$KEY_FILE"
          echo "Sparkle attributes: $ATTRS"
          {
            echo "attrs<<SPARKLE_EOF"
            echo "$ATTRS"
            echo "SPARKLE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build appcast snippet for release notes
        id: snippet
        env:
          ATTRS: ${{ steps.sparkle.outputs.attrs }}
        run: |
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          SNIPPET=$(cat <<EOF
          <item>
              <title>Version $VERSION</title>
              <pubDate>$PUBDATE</pubDate>
              <sparkle:version>$VERSION</sparkle:version>
              <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <enclosure url="https://github.com/kmatzen/lede/releases/download/v$VERSION/Lede-$VERSION.dmg"
                         type="application/octet-stream"
                         $ATTRS />
          </item>
          EOF
          )
          {
            echo "snippet<<SNIPPET_EOF"
            echo "$SNIPPET"
            echo "SNIPPET_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Lede ${{ env.VERSION }}
          generate_release_notes: true
          files: .build/apple/Products/Release/Lede-${{ env.VERSION }}.dmg
          body: |
            ## Download

            **[Lede-${{ env.VERSION }}.dmg](https://github.com/kmatzen/lede/releases/download/v${{ env.VERSION }}/Lede-${{ env.VERSION }}.dmg)** — notarized, stapled, EdDSA-signed.

            Existing installs auto-update via Sparkle once `docs/appcast.xml`
            on `main` includes this entry (committed by the next workflow step):

            ```xml
            ${{ steps.snippet.outputs.snippet }}
            ```

      - name: Publish appcast + update website via PR
        env:
          ATTRS: ${{ steps.sparkle.outputs.attrs }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          BRANCH="release-publish-v$VERSION"

          # Branch off the current tip of main. main may have moved since the
          # tag was created; we want edits on top of whatever HEAD is now.
          git fetch origin main
          git checkout -B "$BRANCH" origin/main

          # Run both edits via Python: the ATTRS string contains base64 with
          # /+= characters that are fragile under sed. Idempotent — if
          # appcast.xml already advertises this version, the workflow
          # replaces that <item> in place rather than duplicating it; the
          # index.html regex substitutions are no-ops when re-run.
          ATTRS="$ATTRS" PUBDATE="$PUBDATE" python3 <<'PYEOF'
          import os, re
          version = os.environ["VERSION"]
          attrs = os.environ["ATTRS"]
          pubdate = os.environ["PUBDATE"]

          # --- docs/appcast.xml ---------------------------------------------
          appcast_path = "docs/appcast.xml"
          with open(appcast_path) as f:
              appcast = f.read()

          item = (
              "        <item>\n"
              f"            <title>Version {version}</title>\n"
              f"            <pubDate>{pubdate}</pubDate>\n"
              f"            <sparkle:version>{version}</sparkle:version>\n"
              f"            <sparkle:shortVersionString>{version}</sparkle:shortVersionString>\n"
              "            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>\n"
              f'            <enclosure url="https://github.com/kmatzen/lede/releases/download/v{version}/Lede-{version}.dmg"\n'
              '                       type="application/octet-stream"\n'
              f"                       {attrs} />\n"
              "        </item>\n"
          )

          existing = re.compile(
              r"        <item>\s*\n"
              r"            <title>Version " + re.escape(version) + r"</title>.*?</item>\n",
              re.DOTALL,
          )
          if existing.search(appcast):
              appcast = existing.sub(item, appcast, count=1)
              print(f"appcast: replaced existing v{version} entry")
          else:
              appcast = appcast.replace("</channel>", item + "    </channel>", 1)
              print(f"appcast: inserted v{version}")
          with open(appcast_path, "w") as f:
              f.write(appcast)

          # --- docs/index.html ----------------------------------------------
          # Three places hard-code the version: the JSON-LD softwareVersion,
          # the hero download URL, and the CTA download URL + button text.
          index_path = "docs/index.html"
          with open(index_path) as f:
              index = f.read()

          subs = [
              (r'("softwareVersion":\s*")[\d.]+(")', r"\g<1>" + version + r"\g<2>"),
              (r"(Lede-)[\d.]+(\.dmg)", r"\g<1>" + version + r"\g<2>"),
              (r"(Download Lede )[\d.]+", r"\g<1>" + version),
          ]
          for pattern, repl in subs:
              index, n = re.subn(pattern, repl, index)
              print(f"index.html: {pattern} → {n} replacement(s)")
          with open(index_path, "w") as f:
              f.write(index)
          PYEOF

          if git diff --quiet docs/appcast.xml docs/index.html; then
              echo "no changes to publish"
              exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml docs/index.html
          git commit -m "Release v$VERSION: appcast + website [skip ci]"
          # Force-push so re-runs of the same tag overwrite the prior attempt's
          # branch instead of erroring on "branch already exists."
          git push --force origin "$BRANCH"

          # Open the PR if one isn't already open for this branch (re-run safe).
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
              gh pr create \
                  --base main \
                  --head "$BRANCH" \
                  --title "Release v$VERSION: appcast + website" \
                  --body "Auto-generated by .github/workflows/release.yml. Publishes the v$VERSION Sparkle entry to docs/appcast.xml and bumps the version on docs/index.html. Branch protection on main requires this be a PR; the workflow attempts to merge it automatically." \
                  > /dev/null
          fi

          # Merge immediately. The "Pull request required" rule allows the
          # author (github-actions[bot]) to merge their own PR as long as no
          # additional review/check requirements are configured.
          if gh pr merge "$BRANCH" --squash --delete-branch; then
              echo "Merged appcast/website PR for v$VERSION."
          else
              echo "::warning::Auto-merge of the appcast/website PR for v$VERSION was declined — merge it manually to publish the update to existing installs."
          fi

      - name: Clean up keychain
        if: always()
        run: |
          # Restore the runner's default keychain before deleting our temp one,
          # otherwise subsequent steps would have no usable default.
          security default-keychain -s login.keychain-db || true
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
